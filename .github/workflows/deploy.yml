name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with zero downtime and rollback
        run: |
          set -e

          RELEASE=$(date +%Y%m%d%H%M%S)
          echo "New release: $RELEASE"

          # Create release directory
          ssh -i ~/.ssh/key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p /var/www/releases/$RELEASE"

          # Sync files
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/key.pem" \
            "$GITHUB_WORKSPACE/" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/releases/$RELEASE/"

          # Save old release path before switching
          OLD_TARGET=$(ssh -i ~/.ssh/key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "readlink -f /var/www/current 2>/dev/null || echo ''")
          echo "Old release: $OLD_TARGET"

          # Switch symlink and restart apache
          ssh -i ~/.ssh/key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo ln -sfn /var/www/releases/$RELEASE /var/www/current && sudo systemctl restart apache2"

          sleep 5

          # Health check against dedicated endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "http://${{ secrets.EC2_HOST }}/health.php")

          echo "Health check HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deployment successful."
          else
            echo "Health check failed (got $HTTP_CODE). Rolling back..."

            if [ -n "$OLD_TARGET" ]; then
              ssh -i ~/.ssh/key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
                "sudo ln -sfn $OLD_TARGET /var/www/current && sudo systemctl restart apache2"
              echo "Rolled back to $OLD_TARGET"
            else
              echo "No previous release to roll back to."
            fi

            exit 1
          fi

      - name: Keep only last 5 releases
        run: |
          ssh -i ~/.ssh/key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd /var/www/releases && ls -1dt */ | tail -n +6 | xargs -r rm -rf"